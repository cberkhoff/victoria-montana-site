name: Validate HTML

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  html-validate:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx html-validate index.html

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g @lhci/cli
      - run: lhci autorun --collect.staticDistDir=. --collect.url=http://localhost/index.html --assert.preset=lighthouse:no-pwa --upload.target=temporary-public-storage
