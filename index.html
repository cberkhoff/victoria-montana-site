<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victoria Montaña — Psicóloga Online</title>
  <meta name="description" content="Psicóloga online para adolescentes y adultos. Sesiones 100% remotas, flexibles y empáticas.">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bulma CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

  <style>
    /* ── Victoria Montaña brand palette ──────────────────────────
       Dusty rose & warm cream — from the business card
    ─────────────────────────────────────────────────────────── */
    :root {
      --primary:      #B5918B;  /* Rosa empolvado, fondo principal   */
      --primary-dark: #8C6B66;  /* Rosa oscuro, sombras y hover      */
      --accent:       #EBDCCC;  /* Crema cálida, logo y textos       */
      --bg-soft:      #F5EDE6;  /* Crema suave, fondo de página      */
      --text-dark:    #3D2B27;  /* Marrón oscuro                     */
      --text-mid:     #7A6460;  /* Marrón medio                      */
      --border-soft:  #D9C8C0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      background-color: var(--bg-soft);
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .hello-card {
      background: var(--primary);
      border-radius: 16px;
      padding: 3rem 3.5rem;
      border: 1px solid var(--border-soft);
      box-shadow: 0 8px 32px rgba(140, 107, 102, 0.2);
      max-width: 520px;
      text-align: center;
      color: var(--accent);
    }

    .logo {
      margin-bottom: 1rem;
    }

    .site-name {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.05rem;
      color: var(--accent);
      opacity: 0.9;
      line-height: 1.7;
      margin-bottom: 1.75rem;
    }

    .contact-info {
      font-size: 0.95rem;
      color: var(--accent);
      opacity: 0.85;
      line-height: 2;
      margin-bottom: 1.5rem;
    }

    .contact-info a {
      color: var(--accent);
      text-decoration: none;
    }

    .contact-info a:hover {
      text-decoration: underline;
    }

    .color-swatches {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1.5rem;
    }

    .swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <div class="hello-card">
    <img src="assets/logo-vm.svg" alt="Victoria Montaña logo" class="logo" width="120" height="120">
    <h1 class="site-name">Victoria Montaña</h1>
    <p class="tagline">
      Psicóloga Clínica<br>
      Atención Remota<br>
      Adolescentes y Adultos
    </p>
    <div class="contact-info">
      <p>📞 <a href="tel:+12069723929">(+1) 206 972 3929</a></p>
      <p>✉️ <a href="mailto:contacto@victoriamontana.cl">contacto@victoriamontana.cl</a></p>
    </div>
    <p style="color: var(--accent); font-size: 0.8rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.08em;">
      Sitio en construcción
    </p>
  </div>

</body>
</html>
